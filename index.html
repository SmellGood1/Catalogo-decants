<!DOCTYPE html>
<html>

<head>
<title>Decants Abdiel</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#f4f4f4;
text-align:center;
}

.catalogo{
display:flex;
flex-wrap:wrap;
justify-content:center;
}

.card{
background:white;
width:230px;
margin:15px;
padding:20px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.card img{
width:140px;
}

button{
background:#111;
color:white;
border:none;
padding:10px 15px;
margin-top:10px;
border-radius:8px;
cursor:pointer;
}

.carrito{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:15px;
border-radius:12px;
font-size:18px;
cursor:pointer;
}

</style>

</head>

<body>

<h1>Decants Abdiel</h1>
<p>Catálogo de decants</p>

<div class="catalogo">

<div class="card">
<img src="https://i.imgur.com/0Z8FQyO.png">
<h3>Tobacco Oud</h3>
<p>$350 / 5ml</p>
<button onclick="agregar('Tobacco Oud',350)">Agregar</button>
</div>

<div class="card">
<img src="https://i.imgur.com/e6y7X1F.png">
<h3>Le Male Elixir</h3>
<p>$220 / 5ml</p>
<button onclick="agregar('Le Male Elixir',220)">Agregar</button>
</div>

<div class="card">
<img src="https://i.imgur.com/Vs6YQ6v.png">
<h3>Ultra Male</h3>
<p>$200 / 5ml</p>
<button onclick="agregar('Ultra Male',200)">Agregar</button>
</div>

</div>

<div class="carrito" onclick="comprar()">
Ver carrito 🛒
</div>

<script>

let carrito = []
let total = 0

function agregar(nombre,precio){

carrito.push(nombre)
total += precio

alert(nombre + " agregado al carrito")

}

function comprar(){

let nombre = prompt("Escribe tu nombre")

let lista = carrito.join(", ")

let mensaje = "Hola soy " + nombre + " y quiero pedir: " + lista + ". Total: $" + total

window.open("https://wa.me/529213042001?text="+encodeURIComponent(mensaje))

}

</script>

</body>
</html>
