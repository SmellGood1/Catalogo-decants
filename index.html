<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmellGood Decants</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    :root{
      --gold:#d4af37;
      --gold-dark:#b89222;
      --bg:#f7f5f1;
      --text:#222;
      --muted:#777;
      --white:#fff;
      --shadow:0 8px 24px rgba(0,0,0,.08);
      --radius:16px;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:"Poppins", sans-serif;
    }

    body{
      background:var(--bg);
      color:var(--text);
    }

    header{
      position:sticky;
      top:0;
      z-index:50;
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:18px 24px;
      background:rgba(255,255,255,.95);
      backdrop-filter:blur(10px);
      box-shadow:0 2px 10px rgba(0,0,0,.06);
    }

    .logo{
      font-family:"Playfair Display", serif;
      font-size:30px;
      color:var(--gold);
      border-bottom:2px solid var(--gold);
      padding-bottom:4px;
      letter-spacing:.5px;
    }

    .header-right{
      display:flex;
      align-items:center;
      gap:14px;
    }

    .buscador{
      padding:10px 14px;
      border:1px solid #ddd;
      border-radius:30px;
      outline:none;
      width:240px;
      background:#fff;
    }

    #carritoBtn{
      cursor:pointer;
      font-size:24px;
      position:relative;
      user-select:none;
    }

    #contador{
      background:var(--gold);
      color:white;
      font-size:12px;
      min-width:22px;
      height:22px;
      display:flex;
      align-items:center;
      justify-content:center;
      border-radius:50%;
      position:absolute;
      top:-8px;
      right:-12px;
      font-weight:600;
    }

    .hero{
      padding:60px 24px 35px;
      text-align:center;
      background:linear-gradient(180deg, #fff 0%, #f7f5f1 100%);
    }

    .hero h1{
      font-family:"Playfair Display", serif;
      font-size:42px;
      line-height:1.15;
      color:#1f1f1f;
      max-width:800px;
      margin:0 auto 14px;
    }

    .hero p{
      max-width:760px;
      margin:0 auto;
      color:var(--muted);
      font-size:16px;
    }

    .catalogo-wrap{
      padding-bottom:60px;
    }

    .casa{
      font-family:"Playfair Display", serif;
      font-size:32px;
      margin:42px 24px 18px;
      color:var(--gold);
      border-bottom:2px solid var(--gold);
      display:inline-block;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(190px,1fr));
      gap:24px;
      padding:0 24px 12px;
    }

    .card{
      background:var(--white);
      padding:16px;
      border-radius:var(--radius);
      text-align:center;
      cursor:pointer;
      transition:.25s ease;
      box-shadow:0 4px 16px rgba(0,0,0,.05);
      border:1px solid rgba(212,175,55,.12);
    }

    .card:hover{
      transform:translateY(-6px);
      box-shadow:0 12px 24px rgba(0,0,0,.10);
    }

    .card img{
      width:100%;
      height:200px;
      object-fit:contain;
      margin-bottom:8px;
    }

    .card .nombre{
      margin-top:8px;
      border-bottom:1px solid var(--gold);
      display:inline-block;
      color:#222;
      font-weight:500;
    }

    .card .conc{
      margin-top:8px;
      font-size:13px;
      color:var(--muted);
    }

    #detalle{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.55);
      display:none;
      justify-content:center;
      align-items:center;
      padding:20px;
      z-index:100;
    }

    .detalleBox{
      background:white;
      width:100%;
      max-width:460px;
      padding:30px;
      border-radius:20px;
      text-align:center;
      animation:zoom .25s ease;
      position:relative;
    }

    @keyframes zoom{
      from{transform:scale(.92);opacity:0}
      to{transform:scale(1);opacity:1}
    }

    .cerrarX{
      position:absolute;
      top:14px;
      right:16px;
      border:none;
      background:none;
      font-size:24px;
      cursor:pointer;
      color:#666;
    }

    .detalleBox img{
      width:220px;
      max-width:100%;
      height:auto;
      object-fit:contain;
    }

    .perfumeNombre{
      font-family:"Playfair Display", serif;
      font-size:28px;
      margin:12px 0 8px;
      border-bottom:2px solid var(--gold);
      display:inline-block;
      line-height:1.2;
    }

    .concentracion{
      color:var(--gold);
      font-weight:600;
      margin:5px 0;
    }

    .marca{
      font-size:14px;
      opacity:.7;
      margin-bottom:16px;
    }

    .campo{
      margin:14px 0;
    }

    .campo label{
      display:block;
      margin-bottom:8px;
      font-size:14px;
      color:#555;
    }

    select, input{
      width:100%;
      padding:12px 14px;
      border:1px solid #ddd;
      border-radius:10px;
      outline:none;
      font-size:15px;
      background:#fff;
    }

    button{
      background:var(--gold);
      border:none;
      padding:12px 18px;
      color:white;
      border-radius:10px;
      cursor:pointer;
      font-weight:600;
      transition:.2s;
    }

    button:hover{
      background:var(--gold-dark);
    }

    .btn-secundario{
      background:#efefef;
      color:#333;
    }

    .btn-secundario:hover{
      background:#ddd;
    }

    #carritoPanel{
      position:fixed;
      right:-380px;
      top:0;
      width:360px;
      max-width:100%;
      height:100%;
      background:white;
      box-shadow:-8px 0 24px rgba(0,0,0,.18);
      transition:.35s ease;
      padding:22px;
      overflow:auto;
      z-index:120;
    }

    #carritoPanel.open{
      right:0;
    }

    .carrito-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:16px;
    }

    .carrito-head h2{
      font-family:"Playfair Display", serif;
      color:var(--gold);
      font-size:30px;
    }

    .item-carrito{
      border:1px solid #eee;
      border-radius:14px;
      padding:12px;
      margin-bottom:12px;
      background:#fcfcfc;
    }

    .item-carrito strong{
      display:block;
      margin-bottom:4px;
    }

    .item-carrito .meta{
      color:#666;
      font-size:14px;
      margin-bottom:8px;
    }

    .item-carrito button{
      padding:8px 12px;
      border-radius:8px;
      font-size:13px;
    }

    .carrito-vacio{
      color:#888;
      font-size:15px;
      margin:10px 0 20px;
    }

    .total{
      font-size:18px;
      font-weight:700;
      margin:16px 0;
      color:#222;
    }

    #toast{
      position:fixed;
      bottom:-90px;
      left:50%;
      transform:translateX(-50%);
      background:#2ecc71;
      color:white;
      padding:14px 22px;
      border-radius:30px;
      transition:.4s ease;
      z-index:200;
      box-shadow:0 8px 20px rgba(0,0,0,.18);
    }

    #toast.show{
      bottom:28px;
    }

    @media(max-width:768px){
      header{
        padding:16px;
        gap:12px;
      }

      .logo{
        font-size:24px;
      }

      .header-right{
        gap:10px;
      }

      .buscador{
        width:150px;
      }

      .hero{
        padding:42px 18px 25px;
      }

      .hero h1{
        font-size:30px;
      }

      .casa{
        font-size:28px;
        margin:34px 18px 14px;
      }

      .grid{
        padding:0 18px 8px;
        gap:18px;
        grid-template-columns:repeat(auto-fill,minmax(155px,1fr));
      }

      .detalleBox{
        padding:24px 18px;
      }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">SmellGood Decants</div>

    <div class="header-right">
      <input
        type="text"
        class="buscador"
        id="buscador"
        placeholder="Buscar perfume..."
      />

      <div id="carritoBtn" onclick="toggleCarrito()">
        🛒
        <span id="contador">0</span>
      </div>
    </div>
  </header>

  <section class="hero">
    <h1>Descubre tu aroma favorito sin gastar una fortuna</h1>
    <p>
      Explora decants de perfumes increíbles, prueba antes de comprar el frasco completo
      y encuentra la fragancia perfecta para ti.
    </p>
  </section>

  <div id="catalogo" class="catalogo-wrap"></div>

  <!-- DETALLE -->
  <div id="detalle" onclick="cerrarDetalle(event)">
    <div class="detalleBox" onclick="event.stopPropagation()">
      <button class="cerrarX" onclick="cerrarDetalle()">×</button>

      <img id="dImg" alt="Perfume" />
      <div class="perfumeNombre" id="dNombre"></div>
      <div class="concentracion" id="dConc"></div>
      <div class="marca" id="dMarca"></div>

      <div class="campo">
        <label for="ml">Selecciona la cantidad</label>
        <select id="ml">
          <option value="1">1 ml</option>
          <option value="2">2 ml</option>
          <option value="3">3 ml</option>
          <option value="5">5 ml</option>
          <option value="10">10 ml</option>
        </select>
      </div>

      <button onclick="addCarrito()">Añadir al carrito</button>
      <br><br>
      <button class="btn-secundario" onclick="cerrarDetalle()">Cerrar</button>
    </div>
  </div>

  <!-- CARRITO -->
  <div id="carritoPanel">
    <div class="carrito-head">
      <h2>Carrito</h2>
      <button class="btn-secundario" onclick="toggleCarrito()">Ocultar</button>
    </div>

    <div id="listaCarrito"></div>

    <div class="total" id="totalCarrito">Total: $0</div>

    <input id="nombreCliente" placeholder="Tu nombre" />

    <br><br>

    <button onclick="enviarPedido()">Enviar pedido</button>
  </div>

  <div id="toast">Añadido exitosamente</div>

  <script>
    const precioML = 8;

    const perfumes = {
      "Armaf":[
        {name:"Odyssey Mandarin Sky",conc:"Eau de Parfum",img:"https://fimgs.net/mdimg/perfume-thumbs/dark-375x500.83132.2x.avif"},
        {name:"Odyssey Aqua",conc:"Eau de Parfum",img:"https://fimgs.net/mdimg/perfume-thumbs/dark-375x500.83134.2x.avif"},
        {name:"Odyssey Homme",conc:"Eau de Parfum",img:"https://fimgs.net/mdimg/perfume-thumbs/dark-375x500.64464.2x.avif"},
        {name:"Club de Nuit Urban Man Elixir",conc:"Eau de Parfum",img:"https://fimgs.net/mdimg/perfume-thumbs/dark-375x500.77860.2x.avif"}
      ],
      "Lattafa":[
        {name:"Ameer Al Oudh Intense Oud",conc:"Eau de Parfum",img:"https://fimgs.net/mdimg/perfume-thumbs/dark-375x500.64947.2x.avif"},
        {name:"Khamrah Qahwa",conc:"Eau de Parfum",img:"https://fimgs.net/mdimg/perfume-thumbs/dark-375x500.88175.2x.avif"},
        {name:"Ishq Al Shuyukh",conc:"Eau de Parfum",img:"https://fimgs.net/mdimg/perfume-thumbs/dark-375x500.81121.2x.avif"},
        {name:"Vintage Radio",conc:"Eau de Parfum",img:"https://fimgs.net/mdimg/perfume-thumbs/dark-375x500.89454.2x.avif"},
        {name:"Ramz Silver",conc:"Eau de Parfum",img:"https://fimgs.net/mdimg/perfume-thumbs/dark-375x500.71868.2x.avif"},
        {name:"Asad",conc:"Eau de Parfum",img:"https://fimgs.net/mdimg/perfume-thumbs/dark-375x500.72821.2x.avif"}
      ],
      "Afnan":[
        {name:"9PM Rebel",conc:"Eau de Parfum",img:"https://fimgs.net/mdimg/perfume-thumbs/dark-375x500.99238.2x.avif"},
        {name:"9PM Night Out",conc:"Extrait de Parfum",img:"https://fimgs.net/mdimg/perfume-thumbs/dark-375x500.123313.2x.avif"},
        {name:"Turathi Blue",conc:"EDP",img:"https://fimgs.net/mdimg/perfume-thumbs/dark-375x500.70839.2x.avif"}
      ],
      "Jean Paul Gaultier":[
        {name:"Le Beau Le Parfum",conc:"Eau de Parfum",img:"https://fimgs.net/mdimg/perfume-thumbs/dark-375x500.72158.2x.avif"}
      ],
      "Swiss Arabian":[
        {name:"Shaghaf Oud Aswad",conc:"Eau de Parfum",img:"https://fimgs.net/mdimg/perfume-thumbs/dark-375x500.54283.2x.avif"}
      ],
      "Rasasi":[
        {name:"Hawas For Him",conc:"Eau de Parfum",img:"https://fimgs.net/mdimg/perfume-thumbs/dark-375x500.46890.2x.avif"}
      ]
    };

    let carrito = [];
    let actual = null;

    const catalogo = document.getElementById("catalogo");
    const listaCarrito = document.getElementById("listaCarrito");
    const contador = document.getElementById("contador");
    const carritoPanel = document.getElementById("carritoPanel");
    const detalle = document.getElementById("detalle");
    const dImg = document.getElementById("dImg");
    const dNombre = document.getElementById("dNombre");
    const dConc = document.getElementById("dConc");
    const dMarca = document.getElementById("dMarca");
    const toast = document.getElementById("toast");
    const buscador = document.getElementById("buscador");
    const totalCarrito = document.getElementById("totalCarrito");

    function obtenerTodosLosPerfumes() {
      const resultado = [];
      for (const casa in perfumes) {
        perfumes[casa].forEach(p => {
          resultado.push({ ...p, casa });
        });
      }
      return resultado;
    }

    function renderCatalogo(filtro = "") {
      catalogo.innerHTML = "";

      for (const casa in perfumes) {
        const perfumesFiltrados = perfumes[casa].filter(p =>
          p.name.toLowerCase().includes(filtro.toLowerCase()) ||
          casa.toLowerCase().includes(filtro.toLowerCase()) ||
          p.conc.toLowerCase().includes(filtro.toLowerCase())
        );

        if (!perfumesFiltrados.length) continue;

        const titulo = document.createElement("div");
        titulo.className = "casa";
        titulo.textContent = casa;
        catalogo.appendChild(titulo);

        const grid = document.createElement("div");
        grid.className = "grid";

        perfumesFiltrados.forEach(p => {
          const card = document.createElement("div");
          card.className = "card";
          card.innerHTML = `
            <img src="${p.img}" alt="${p.name}">
            <div class="nombre">${p.name}</div>
            <div class="conc">${p.conc}</div>
          `;
          card.onclick = () => verPerfume({ ...p, casa });
          grid.appendChild(card);
        });

        catalogo.appendChild(grid);
      }
    }

    function verPerfume(p) {
      actual = p;
      dImg.src = p.img;
      dImg.alt = p.name;
      dNombre.innerText = p.name;
      dConc.innerText = p.conc;
      dMarca.innerText = "Casa: " + p.casa;
      document.getElementById("ml").value = "1";
      detalle.style.display = "flex";
      document.body.style.overflow = "hidden";
    }

    function cerrarDetalle() {
      detalle.style.display = "none";
      document.body.style.overflow = "auto";
    }

    function addCarrito() {
      if (!actual) return;

      const ml = Number(document.getElementById("ml").value);
      const precio = ml * precioML;

      carrito.push({
        nombre: actual.name,
        ml,
        precio
      });

      renderCarrito();
      cerrarDetalle();
      mostrarToast("Añadido exitosamente");
    }

    function eliminar(index) {
      carrito.splice(index, 1);
      renderCarrito();
      mostrarToast("Producto eliminado");
    }

    function renderCarrito() {
      contador.innerText = carrito.length;

      if (!carrito.length) {
        listaCarrito.innerHTML = `<div class="carrito-vacio">Tu carrito está vacío.</div>`;
        totalCarrito.innerText = "Total: $0";
        return;
      }

      listaCarrito.innerHTML = "";
      let total = 0;

      carrito.forEach((item, index) => {
        total += item.precio;

        const div = document.createElement("div");
        div.className = "item-carrito";
        div.innerHTML = `
          <strong>${item.nombre}</strong>
          <div class="meta">${item.ml} ml · $${item.precio}</div>
          <button onclick="eliminar(${index})">Eliminar</button>
        `;
        listaCarrito.appendChild(div);
      });

      totalCarrito.innerText = `Total: $${total}`;
    }

    function toggleCarrito() {
      carritoPanel.classList.toggle("open");
    }

    function enviarPedido() {
      const nombre = document.getElementById("nombreCliente").value.trim();

      if (!nombre) {
        mostrarToast("Escribe tu nombre");
        return;
      }

      if (!carrito.length) {
        mostrarToast("Tu carrito está vacío");
        return;
      }

      let total = 0;
      let texto = `Hola Jhoan, soy ${nombre} y me gustaría hacer mi pedido de decants.\n\n`;

      carrito.forEach(p => {
        texto += `• ${p.nombre} - ${p.ml}ml ($${p.precio})\n`;
        total += p.precio;
      });

      texto += `\nTotal de mi pedido: $${total}`;

      const numero = "529213042001";
      const url = `https://wa.me/${numero}?text=${encodeURIComponent(texto)}`;
      window.open(url, "_blank");
    }

    function mostrarToast(mensaje) {
      toast.innerText = mensaje;
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 2000);
    }

    buscador.addEventListener("input", (e) => {
      renderCatalogo(e.target.value);
    });

    renderCatalogo();
    renderCarrito();
  </script>
</body>
</html>
