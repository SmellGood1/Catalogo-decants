<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Decants Abdiel</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

/* HEADER */

header{
background:black;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

#carritoBtn{
cursor:pointer;
font-size:22px;
}

/* CATALOGO */

.catalogo{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:15px;
padding:20px;
}

.card{
background:white;
padding:10px;
border-radius:12px;
text-align:center;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
cursor:pointer;
transition:0.2s;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:100%;
height:160px;
object-fit:contain;
}

/* DETALLE */

.detalle{
display:none;
padding:25px;
text-align:center;
}

button{
padding:10px 15px;
border:none;
border-radius:8px;
background:black;
color:white;
margin-top:10px;
cursor:pointer;
}

/* CARRITO */

#carritoPanel{
position:fixed;
right:-320px;
top:0;
width:300px;
height:100%;
background:white;
box-shadow:-3px 0 10px rgba(0,0,0,0.2);
padding:20px;
transition:0.4s;
overflow:auto;
}

#carritoPanel.activo{
right:0;
}

</style>
</head>

<body>

<header>

<h2>Decants Abdiel</h2>

<div id="carritoBtn" onclick="toggleCarrito()">
🛒
</div>

</header>

<div id="catalogo" class="catalogo"></div>

<div id="detalle" class="detalle">

<h2 id="nombrePerfume"></h2>

<select id="mlSelect">

<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
<option>6</option>
<option>7</option>
<option>8</option>
<option>9</option>
<option>10</option>

</select>

<br>

<button onclick="agregar()">Agregar al carrito</button>

<br><br>

<button onclick="volver()">Volver</button>

</div>

<div id="carritoPanel">

<h3>Carrito</h3>

<div id="listaCarrito"></div>

<hr>

Total: $<span id="total">0</span>

<br><br>

<button onclick="comprar()">Comprar carrito</button>

</div>

<script>

/* PERFUMES */

let perfumes=[

{
nombre:"Asad Clasico",
img:"https://fimgs.net/mdimg/perfume/375x500.70603.jpg"
},

{
nombre:"Hawas Clasico",
img:"https://fimgs.net/mdimg/perfume/375x500.46890.jpg"
},

{
nombre:"Le Beau Le Parfum",
img:"https://fimgs.net/mdimg/perfume/375x500.72106.jpg"
},

{
nombre:"Shaghaf Oud Aswad",
img:"https://fimgs.net/mdimg/perfume/375x500.58539.jpg"
},

{
nombre:"Al Qiam Gold",
img:"https://fimgs.net/mdimg/perfume/375x500.76820.jpg"
},

{
nombre:"Vintage Radio",
img:"https://fimgs.net/mdimg/perfume/375x500.74853.jpg"
},

{
nombre:"Ramz Silver",
img:"https://fimgs.net/mdimg/perfume/375x500.47870.jpg"
},

{
nombre:"Ishq Al Shuyukh",
img:"https://fimgs.net/mdimg/perfume/375x500.71924.jpg"
},

{
nombre:"Turathi Blue",
img:"https://fimgs.net/mdimg/perfume/375x500.64604.jpg"
},

{
nombre:"CDN Urban Man Intense",
img:"https://fimgs.net/mdimg/perfume/375x500.50812.jpg"
},

{
nombre:"Khamrah Qawah",
img:"https://fimgs.net/mdimg/perfume/375x500.82910.jpg"
},

{
nombre:"Odyssey Homme",
img:"https://fimgs.net/mdimg/perfume/375x500.64545.jpg"
},

{
nombre:"9PM Rebel",
img:"https://fimgs.net/mdimg/perfume/375x500.82176.jpg"
},

{
nombre:"Odyssey Mandarin Sky",
img:"https://fimgs.net/mdimg/perfume/375x500.70268.jpg"
},

{
nombre:"Odyssey Aqua",
img:"https://fimgs.net/mdimg/perfume/375x500.78045.jpg"
},

{
nombre:"Emeer Lattafa",
img:"https://fimgs.net/mdimg/perfume/375x500.78662.jpg"
},

{
nombre:"9PM Night Out",
img:"https://fimgs.net/mdimg/perfume/375x500.82512.jpg"
}

]

let catalogo=document.getElementById("catalogo")

perfumes.forEach(p=>{

catalogo.innerHTML+=`

<div class="card" onclick="verPerfume('${p.nombre}')">

<img src="${p.img}">
<h4>${p.nombre}</h4>

</div>

`

})

/* VARIABLES */

let perfumeActual=""
let precioML=40
let carrito=[]
let total=0

/* VER PERFUME */

function verPerfume(nombre){

perfumeActual=nombre

document.getElementById("catalogo").style.display="none"
document.getElementById("detalle").style.display="block"

document.getElementById("nombrePerfume").innerText=nombre

}

/* VOLVER */

function volver(){

document.getElementById("catalogo").style.display="grid"
document.getElementById("detalle").style.display="none"

}

/* AGREGAR AL CARRITO */

function agregar(){

let ml=parseInt(document.getElementById("mlSelect").value)

let precio=ml*precioML

carrito.push({
nombre:perfumeActual,
ml:ml,
precio:precio
})

actualizarCarrito()

}

/* ACTUALIZAR CARRITO */

function actualizarCarrito(){

let lista=""

total=0

carrito.forEach((item,index)=>{

lista+=item.nombre+" "+item.ml+"ml ($"+item.precio+") <button onclick='eliminar("+index+")'>❌</button><br>"

total+=item.precio

})

document.getElementById("listaCarrito").innerHTML=lista
document.getElementById("total").innerText=total

}

/* ELIMINAR */

function eliminar(i){

carrito.splice(i,1)

actualizarCarrito()

}

/* TOGGLE CARRITO */

function toggleCarrito(){

document.getElementById("carritoPanel").classList.toggle("activo")

}

/* WHATSAPP */

function comprar(){

let nombre=prompt("Tu nombre")

let pedido=""

carrito.forEach(item=>{

pedido+=item.nombre+" "+item.ml+"ml ($"+item.precio+")%0A"

})

let mensaje="Hola Jhoan, soy "+nombre+" y quiero pedir:%0A%0A"+pedido+"%0ATotal: $"+total

window.open("https://wa.me/529213042001?text="+mensaje)

}

</script>

</body>
</html>
