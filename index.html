<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Decants Abdiel</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

header{
background:black;
color:white;
padding:15px;
text-align:center;
}

.catalogo{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:15px;
padding:20px;
}

.card{
background:white;
padding:15px;
border-radius:12px;
text-align:center;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
cursor:pointer;
}

.card:hover{
transform:scale(1.03);
}

.detalle{
display:none;
padding:25px;
text-align:center;
}

button{
padding:10px 15px;
border:none;
border-radius:8px;
background:black;
color:white;
margin-top:10px;
}

#abrirCarrito{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
padding:14px;
border-radius:50px;
color:white;
cursor:pointer;
}

#carritoPanel{
position:fixed;
right:-320px;
top:0;
width:300px;
height:100%;
background:white;
box-shadow:-3px 0 10px rgba(0,0,0,0.2);
padding:20px;
transition:0.3s;
overflow:auto;
}

#carritoPanel.activo{
right:0;
}

</style>
</head>

<body>

<header>
<h2>Decants Abdiel</h2>
</header>

<div id="catalogo" class="catalogo"></div>

<div id="detalle" class="detalle">

<h2 id="nombrePerfume"></h2>

<select id="mlSelect">
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
<option>6</option>
<option>7</option>
<option>8</option>
<option>9</option>
<option>10</option>
</select>

<br>

<button onclick="agregar()">Agregar al carrito</button>

<br><br>

<button onclick="volver()">Volver</button>

</div>

<div id="abrirCarrito" onclick="toggleCarrito()">
🛒
</div>

<div id="carritoPanel">

<h3>Carrito</h3>

<div id="listaCarrito"></div>

<hr>

Total: $<span id="total">0</span>

<br><br>

<button onclick="comprar()">Comprar carrito</button>

</div>

<script>

let perfumes=[
"Asad Clasico",
"Hawas Clasico",
"Le beau le parfum",
"Shaghaf oud aswad",
"Al qiam gold",
"Vintage radio",
"Ramz Silver",
"Ishq al Shuyukh",
"Durathi Blue",
"Club de nuit urban man intense",
"Khamrah Qawah",
"Odyssey homme",
"9pm Rebel",
"Odyssey Mandarin Sky",
"Odyssey Aqua",
"Emeer Lattafa Al Oud",
"9pm Night Out"
]

let catalogo=document.getElementById("catalogo")

perfumes.forEach(p=>{

catalogo.innerHTML+=`
<div class="card" onclick="verPerfume('${p}')">
<h4>${p}</h4>
</div>
`

})

let perfumeActual=""
let precioML=40

let carrito=[]
let total=0

function verPerfume(nombre){

perfumeActual=nombre

document.getElementById("catalogo").style.display="none"
document.getElementById("detalle").style.display="block"

document.getElementById("nombrePerfume").innerText=nombre

}

function volver(){

document.getElementById("catalogo").style.display="grid"
document.getElementById("detalle").style.display="none"

}

function agregar(){

let ml=parseInt(document.getElementById("mlSelect").value)

ml=ml+1

let precio=ml*precioML

carrito.push({
nombre:perfumeActual,
ml:ml,
precio:precio
})

actualizarCarrito()

}

function actualizarCarrito(){

let lista=""

total=0

carrito.forEach(item=>{

lista+=item.nombre+" "+item.ml+"ml ($"+item.precio+")<br>"

total+=item.precio

})

document.getElementById("listaCarrito").innerHTML=lista

document.getElementById("total").innerText=total

}

function toggleCarrito(){

document.getElementById("carritoPanel").classList.toggle("activo")

}

function comprar(){

let nombre=prompt("Tu nombre")

let pedido=""

carrito.forEach(item=>{

pedido+=item.nombre+" "+item.ml+"ml ($"+item.precio+")%0A"

})

let mensaje="Hola Jhoan, soy "+nombre+" me gustaría realizar mi pedido:%0A%0A"+pedido+"%0ATotal del pedido $"+total

window.open("https://wa.me/529213042001?text="+mensaje)

}

</script>

</body>
</html>
