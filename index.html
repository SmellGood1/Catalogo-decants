<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmellGood Decants</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{
--gold:#d4af37;
--bg:#f7f7f7;
--card:#ffffff;
--text:#222;
}

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Inter;
}

body{
background:var(--bg);
color:var(--text);
}

/* HEADER */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 30px;
background:white;
box-shadow:0 2px 10px rgba(0,0,0,.08);
position:sticky;
top:0;
z-index:10;
}

.logo{
font-family:"Playfair Display";
font-size:26px;
color:var(--gold);
font-weight:700;
}

#carritoBtn{
cursor:pointer;
font-size:20px;
position:relative;
}

#contador{
background:var(--gold);
color:white;
font-size:12px;
padding:3px 7px;
border-radius:20px;
position:absolute;
top:-8px;
right:-12px;
}

/* GRID PERFUMES */

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
gap:25px;
padding:40px;
}

.card{
background:var(--card);
padding:15px;
border-radius:12px;
text-align:center;
cursor:pointer;
transition:.25s;
box-shadow:0 3px 10px rgba(0,0,0,.05);
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
height:180px;
object-fit:contain;
}

/* PERFUME VIEW */

#detalle{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.5);
display:none;
justify-content:center;
align-items:center;
}

.detalleBox{
background:white;
width:420px;
padding:30px;
border-radius:15px;
text-align:center;
animation:scale .3s;
}

@keyframes scale{
from{transform:scale(.8);opacity:0}
to{transform:scale(1);opacity:1}
}

.detalleBox img{
width:220px;
}

.perfumeNombre{
font-family:"Playfair Display";
font-size:24px;
margin:10px 0;
}

.concentracion{
color:var(--gold);
font-weight:600;
}

.marca{
font-size:14px;
opacity:.7;
margin-bottom:10px;
}

select{
padding:10px;
margin:10px 0;
}

button{
background:var(--gold);
border:none;
padding:12px 20px;
color:white;
border-radius:6px;
cursor:pointer;
font-weight:600;
}

/* CARRITO */

#carritoPanel{
position:fixed;
right:-350px;
top:0;
width:320px;
height:100%;
background:white;
box-shadow:-3px 0 10px rgba(0,0,0,.2);
transition:.4s;
padding:25px;
overflow:auto;
}

#carritoPanel.open{
right:0;
}

/* TOAST */

#toast{
position:fixed;
bottom:-80px;
left:50%;
transform:translateX(-50%);
background:#2ecc71;
color:white;
padding:15px 25px;
border-radius:30px;
transition:.5s;
}

#toast.show{
bottom:30px;
}

.casa{
font-family:"Playfair Display";
font-size:28px;
margin:30px 40px 0;
color:var(--gold);
}

</style>
</head>

<body>

<header>
<div class="logo">SmellGood Decants</div>

<div id="carritoBtn" onclick="toggleCarrito()">
🛒
<span id="contador">0</span>
</div>
</header>


<div id="catalogo"></div>


<!-- DETALLE PERFUME -->

<div id="detalle">
<div class="detalleBox">
<img id="dImg">
<div class="perfumeNombre" id="dNombre"></div>
<div class="concentracion" id="dConc"></div>
<div class="marca" id="dMarca"></div>

<select id="ml">
<option value="1">1 ml</option>
<option value="2">2 ml</option>
<option value="3">3 ml</option>
<option value="4">4 ml</option>
<option value="5">5 ml</option>
<option value="6">6 ml</option>
<option value="7">7 ml</option>
<option value="8">8 ml</option>
<option value="9">9 ml</option>
<option value="10">10 ml</option>
</select>

<br>
<button onclick="addCarrito()">Añadir al carrito</button>
<br><br>
<button onclick="cerrarDetalle()">Cerrar</button>

</div>
</div>


<!-- CARRITO -->

<div id="carritoPanel">

<h2>Carrito</h2>
<br>

<div id="listaCarrito"></div>

<br>
<input id="nombreCliente" placeholder="Tu nombre">

<br><br>

<button onclick="enviarPedido()">Enviar pedido</button>

</div>

<div id="toast">Añadido exitosamente</div>

<script>

const perfumes={

"Armaf":[
{name:"Odyssey Mandarin Sky",conc:"EDP",img:"images/odyssey_mandarin.jpg"},
{name:"Odyssey Aqua",conc:"EDP",img:"images/odyssey_aqua.jpg"},
{name:"Odyssey Homme",conc:"EDP",img:"images/odyssey_homme.jpg"},
{name:"Club de Nuit Urban Man Elixir",conc:"EDP",img:"images/urban_elixir.jpg"}
],

"Lattafa":[
{name:"Emeer Al Oud",conc:"EDP",img:"images/emeer_oud.jpg"},
{name:"Khamrah Qahwa",conc:"EDP",img:"images/khamrah_qahwa.jpg"},
{name:"Ishq Al Shuyukh",conc:"EDP",img:"images/ishq.jpg"},
{name:"Vintage Radio",conc:"EDP",img:"images/vintage_radio.jpg"},
{name:"Ramz Silver",conc:"EDP",img:"images/ramz_silver.jpg"},
{name:"Asad",conc:"EDP",img:"images/asad.jpg"}
],

"Afnan":[
{name:"9PM Rebel",conc:"EDP",img:"images/9pm_rebel.jpg"},
{name:"9PM Night Out",conc:"EDP",img:"images/9pm_night.jpg"},
{name:"Turathi Blue",conc:"EDP",img:"images/turathi_blue.jpg"}
],

"Jean Paul Gaultier":[
{name:"Le Beau Le Parfum",conc:"EDP",img:"images/le_beau.jpg"}
],

"Swiss Arabian":[
{name:"Shaghaf Oud Aswad",conc:"EDP",img:"images/shaghaf_aswad.jpg"}
],

"Rasasi":[
{name:"Hawas For Him",conc:"EDP",img:"images/hawas.jpg"}
]

}

let actual=null
let carrito=[]

const catalogo=document.getElementById("catalogo")

for(const casa in perfumes){

catalogo.innerHTML+=`<div class="casa">${casa}</div>`
catalogo.innerHTML+=`<div class="grid" id="${casa}"></div>`

perfumes[casa].forEach(p=>{

document.getElementById(casa).innerHTML+=`

<div class="card" onclick='verPerfume(${JSON.stringify(p)})'>
<img src="${p.img}">
<div>${p.name}</div>
</div>

`

})

}

function verPerfume(p){

actual=p

dImg.src=p.img
dNombre.innerText=p.name
dConc.innerText=p.conc
dMarca.innerText="Casa: "+buscarMarca(p.name)

detalle.style.display="flex"

}

function cerrarDetalle(){
detalle.style.display="none"
}

function addCarrito(){

let ml=document.getElementById("ml").value

carrito.push(`${actual.name} - ${ml}ml`)

contador.innerText=carrito.length

listaCarrito.innerHTML+=`<div>${actual.name} ${ml}ml</div>`

toast.classList.add("show")

setTimeout(()=>toast.classList.remove("show"),2000)

}

function toggleCarrito(){
carritoPanel.classList.toggle("open")
}

function enviarPedido(){

let nombre=nombreCliente.value

let texto="Pedido SmellGood Decants%0A"

carrito.forEach(p=>texto+=p+"%0A")

texto+="Cliente: "+nombre

window.open(`https://wa.me/521XXXXXXXXXX?text=${texto}`)

}

function buscarMarca(nombre){

for(const casa in perfumes){

if(perfumes[casa].some(p=>p.name===nombre))
return casa

}

}

</script>

</body>
</html>
