<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tienda de Perfumes</title>

<style>

body{
font-family: Arial;
background:#111;
color:white;
margin:0;
padding:0;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px;
background:#000;
}

h1{
margin:0;
}

.cart-btn{
background:#444;
border:none;
color:white;
padding:10px 20px;
cursor:pointer;
}

.products{
display:flex;
gap:20px;
padding:20px;
flex-wrap:wrap;
}

.product{
background:#1b1b1b;
padding:20px;
border-radius:10px;
width:200px;
text-align:center;
}

.product button{
margin-top:10px;
padding:8px;
border:none;
background:#333;
color:white;
cursor:pointer;
}

/* carrito */

.cart{
position:fixed;
top:0;
right:-400px;
width:300px;
height:100%;
background:#000;
padding:20px;
transition:0.3s;
overflow:auto;
}

.cart.active{
right:0;
}

.close-cart{
background:red;
border:none;
color:white;
padding:8px 15px;
cursor:pointer;
margin-bottom:10px;
}

</style>
</head>

<body>

<header>

<h1>Perfumes</h1>

<button class="cart-btn" onclick="openCart()">
🛒 Carrito
</button>

</header>


<div class="products">

<div class="product">
<h3>Bleu de Chanel</h3>
<p>$120</p>
<button onclick="addToCart('Bleu de Chanel')">
Agregar
</button>
</div>

<div class="product">
<h3>Dior Sauvage</h3>
<p>$110</p>
<button onclick="addToCart('Dior Sauvage')">
Agregar
</button>
</div>

<div class="product">
<h3>Versace Eros</h3>
<p>$95</p>
<button onclick="addToCart('Versace Eros')">
Agregar
</button>
</div>

</div>


<div class="cart" id="cart">

<button class="close-cart" onclick="closeCart()">
Cerrar
</button>

<h2>Tu carrito</h2>

<ul id="cart-items"></ul>

</div>


<script>

function openCart(){
document.getElementById("cart").classList.add("active")
}

function closeCart(){
document.getElementById("cart").classList.remove("active")
}

function addToCart(product){

let list = document.getElementById("cart-items")

let item = document.createElement("li")

item.textContent = product

list.appendChild(item)

}

</script>

</body>
</html>
