<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Decants Abdiel</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

/* HEADER */

header{
background:black;
color:white;
padding:15px 20px;
display:flex;
justify-content:space-between;
align-items:center;
}

#carritoBtn{
cursor:pointer;
font-size:20px;
}

/* GRID */

.catalogo{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:20px;
padding:20px;

}

.card{

background:white;
border-radius:12px;
padding:15px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
transition:0.25s;
}

.card:hover{

transform:translateY(-5px);

}

.card img{

height:180px;
width:100%;
object-fit:contain;

}

.card button{

margin-top:10px;
padding:8px 14px;
border:none;
background:black;
color:white;
border-radius:6px;
cursor:pointer;

}

/* DETALLE */

.detalle{

display:none;
text-align:center;
padding:40px;

}

select{

padding:8px;
border-radius:6px;

}

/* CARRITO */

#carrito{

position:fixed;
top:0;
right:-320px;
width:300px;
height:100%;
background:white;
box-shadow:-4px 0 20px rgba(0,0,0,0.2);
padding:20px;
transition:0.3s;
overflow:auto;

}

#carrito.activo{

right:0;

}

</style>

</head>

<body>

<header>

<h2>Decants Abdiel</h2>

<div id="carritoBtn" onclick="toggleCarrito()">🛒</div>

</header>

<div id="catalogo" class="catalogo"></div>

<div id="detalle" class="detalle">

<h2 id="nombre"></h2>

<select id="ml">

<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
<option>6</option>
<option>7</option>
<option>8</option>
<option>9</option>
<option>10</option>

</select>

<br><br>

<button onclick="agregar()">Agregar</button>

<br><br>

<button onclick="volver()">Volver</button>

</div>

<div id="carrito">

<h3>Carrito</h3>

<div id="lista"></div>

<hr>

Total $<span id="total">0</span>

<br><br>

<button onclick="comprar()">Comprar</button>

</div>

<script>

let perfumes=[

{
nombre:"Lattafa Asad",
img:"https://fimgs.net/mdimg/perfume/375x500.70603.jpg"
},

{
nombre:"Rasasi Hawas",
img:"https://fimgs.net/mdimg/perfume/375x500.46890.jpg"
},

{
nombre:"Le Beau Le Parfum",
img:"https://fimgs.net/mdimg/perfume/375x500.72106.jpg"
},

{
nombre:"Turathi Blue",
img:"https://fimgs.net/mdimg/perfume/375x500.64604.jpg"
},

{
nombre:"Khamrah Qawah",
img:"https://fimgs.net/mdimg/perfume/375x500.82910.jpg"
},

{
nombre:"Afnan 9PM",
img:"https://fimgs.net/mdimg/perfume/375x500.65414.jpg"
}

]

let catalogo=document.getElementById("catalogo")

perfumes.forEach(p=>{

catalogo.innerHTML+=`

<div class="card">

<img src="${p.img}">

<h4>${p.nombre}</h4>

<button onclick="ver('${p.nombre}')">Ver perfume</button>

</div>

`

})

let perfumeActual=""
let carrito=[]
let total=0
let precioML=40

function ver(nombre){

perfumeActual=nombre

catalogo.style.display="none"
detalle.style.display="block"

document.getElementById("nombre").innerText=nombre

}

function volver(){

catalogo.style.display="grid"
detalle.style.display="none"

}

function agregar(){

let ml=parseInt(document.getElementById("ml").value)

let precio=ml*precioML

carrito.push({

nombre:perfumeActual,
ml:ml,
precio:precio

})

actualizar()

}

function actualizar(){

let lista=""
total=0

carrito.forEach((p,i)=>{

lista+=p.nombre+" "+p.ml+"ml $"+p.precio+" <button onclick='eliminar("+i+")'>❌</button><br>"

total+=p.precio

})

document.getElementById("lista").innerHTML=lista
document.getElementById("total").innerText=total

}

function eliminar(i){

carrito.splice(i,1)

actualizar()

}

function toggleCarrito(){

document.getElementById("carrito").classList.toggle("activo")

}

function comprar(){

let nombre=prompt("Tu nombre")

let pedido=""

carrito.forEach(p=>{

pedido+=p.nombre+" "+p.ml+"ml $"+p.precio+"%0A"

})

let mensaje="Hola quiero pedir:%0A"+pedido+"Total $"+total

window.open("https://wa.me/529213042001?text="+mensaje)

}

</script>

</body>
</html>
