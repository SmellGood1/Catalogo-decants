<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SmellGood Decants</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f4f4;
}

/* HEADER */

header{
background:black;
color:white;
padding:15px 20px;
display:flex;
justify-content:space-between;
align-items:center;
}

#carritoBtn{
cursor:pointer;
font-size:20px;
}

#contador{
background:red;
border-radius:50%;
padding:2px 7px;
font-size:12px;
margin-left:5px;
}

/* CATALOGO */

.catalogo{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:18px;
padding:20px;
}

.card{
background:white;
padding:12px;
border-radius:12px;
text-align:center;
box-shadow:0 5px 12px rgba(0,0,0,0.1);
cursor:pointer;
transition:0.25s;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:100%;
height:160px;
object-fit:contain;
}

/* DETALLE */

.detalle{
display:none;
padding:30px;
text-align:center;
}

select{
padding:8px;
border-radius:6px;
}

button{
padding:10px 16px;
border:none;
border-radius:8px;
background:black;
color:white;
margin-top:10px;
cursor:pointer;
}

/* CARRITO */

#carritoPanel{
position:fixed;
right:-330px;
top:0;
width:300px;
height:100%;
background:white;
box-shadow:-4px 0 15px rgba(0,0,0,0.2);
padding:20px;
transition:0.35s ease;
overflow:auto;
z-index:999;
}

#carritoPanel.activo{
right:0;
}

.cerrar{
float:right;
cursor:pointer;
font-size:18px;
}

</style>

</head>

<body>

<header>

<h2>Decants Abdiel</h2>

<div id="carritoBtn" onclick="toggleCarrito()">
🛒 <span id="contador">0</span>
</div>

</header>

<div id="catalogo" class="catalogo"></div>

<div id="detalle" class="detalle">

<h2 id="nombrePerfume"></h2>

<select id="mlSelect">

<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
<option>6</option>
<option>7</option>
<option>8</option>
<option>9</option>
<option>10</option>

</select>

<br>

<button onclick="agregar()">Agregar al carrito</button>

<br><br>

<button onclick="volver()">Volver</button>

</div>

<div id="carritoPanel">

<span class="cerrar" onclick="toggleCarrito()">✖</span>

<h3>Carrito</h3>

<div id="listaCarrito"></div>

<hr>

Total: $<span id="total">0</span>

<br><br>

<button onclick="comprar()">Comprar</button>

</div>

<script>

/* PERFUMES */

let perfumes=[

{
nombre:"Asad",
img:"https://fimgs.net/mdimg/perfume/375x500.70603.jpg"
},

{
nombre:"Hawas",
img:"https://fimgs.net/mdimg/perfume/375x500.46890.jpg"
},

{
nombre:"Le Beau Le Parfum",
img:"https://fimgs.net/mdimg/perfume/375x500.72106.jpg"
},

{
nombre:"Shaghaf Oud Aswad",
img:"https://fimgs.net/mdimg/perfume/375x500.58539.jpg"
},

{
nombre:"Turathi Blue",
img:"https://fimgs.net/mdimg/perfume/375x500.64604.jpg"
},

{
nombre:"Khamrah Qawah",
img:"https://fimgs.net/mdimg/perfume/375x500.82910.jpg"
},

{
nombre:"9PM",
img:"https://fimgs.net/mdimg/perfume/375x500.65414.jpg"
},

{
nombre:"Odyssey Homme",
img:"https://fimgs.net/mdimg/perfume/375x500.64545.jpg"
}

]

let catalogo=document.getElementById("catalogo")

perfumes.forEach(p=>{

catalogo.innerHTML+=`

<div class="card" onclick="verPerfume('${p.nombre}')">

<img src="${p.img}">

<h4>${p.nombre}</h4>

</div>

`

})

/* VARIABLES */

let perfumeActual=""
let precioML=40
let carrito=[]
let total=0

/* VER PERFUME */

function verPerfume(nombre){

perfumeActual=nombre

catalogo.style.display="none"
detalle.style.display="block"

nombrePerfume.innerText=nombre

}

/* VOLVER */

function volver(){

catalogo.style.display="grid"
detalle.style.display="none"

}

/* AGREGAR */

function agregar(){

let ml=parseInt(mlSelect.value)

let precio=ml*precioML

carrito.push({
nombre:perfumeActual,
ml:ml,
precio:precio
})

actualizarCarrito()

}

/* ACTUALIZAR */

function actualizarCarrito(){

let lista=""
total=0

carrito.forEach((item,index)=>{

lista+=item.nombre+" "+item.ml+"ml ($"+item.precio+") <button onclick='eliminar("+index+")'>❌</button><br>"

total+=item.precio

})

listaCarrito.innerHTML=lista
total.innerText=total
contador.innerText=carrito.length

}

/* ELIMINAR */

function eliminar(i){

carrito.splice(i,1)

actualizarCarrito()

}

/* CARRITO */

function toggleCarrito(){

carritoPanel.classList.toggle("activo")

}

/* WHATSAPP */

function comprar(){

let nombre=prompt("Tu nombre")

let pedido=""

carrito.forEach(item=>{

pedido+=item.nombre+" "+item.ml+"ml ($"+item.precio+")%0A"

})

let mensaje="Hola Jhoan, soy "+nombre+" quiero pedir:%0A%0A"+pedido+"%0ATotal $"+total

window.open("https://wa.me/529213042001?text="+mensaje)

}

</script>

</body>

</html>
