<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Decants Abdiel</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
margin:0;
}

header{
background:black;
color:white;
padding:15px;
text-align:center;
}

.catalogo{
display:flex;
flex-wrap:wrap;
justify-content:center;
padding:20px;
}

.card{
background:white;
width:200px;
margin:10px;
padding:15px;
border-radius:10px;
text-align:center;
cursor:pointer;
}

.card img{
width:120px;
}

.detalle{
display:none;
padding:20px;
text-align:center;
}

select,button{
padding:10px;
margin-top:10px;
}

.carrito{
position:fixed;
right:0;
top:0;
width:250px;
height:100%;
background:white;
box-shadow:-3px 0 10px rgba(0,0,0,0.1);
padding:15px;
overflow:auto;
}

</style>

</head>

<body>

<header>
<h2>Decants Abdiel</h2>
</header>

<div id="catalogo" class="catalogo">

<div class="card" onclick="verPerfume('Le Male Elixir',44)">
<img src="https://i.imgur.com/e6y7X1F.png">
<h3>Le Male Elixir</h3>
</div>

<div class="card" onclick="verPerfume('Le Beau Le Parfum',40)">
<img src="https://i.imgur.com/0Z8FQyO.png">
<h3>Le Beau Le Parfum</h3>
</div>

</div>


<div id="detalle" class="detalle">

<h2 id="nombrePerfume"></h2>

<p>Selecciona los ml</p>

<select id="mlSelect">
<option value="2">2 ml</option>
<option value="3">3 ml</option>
<option value="4">4 ml</option>
<option value="5">5 ml</option>
<option value="6">6 ml</option>
<option value="7">7 ml</option>
<option value="8">8 ml</option>
<option value="9">9 ml</option>
<option value="10">10 ml</option>
</select>

<br>

<button onclick="agregar()">Agregar al carrito</button>

<br><br>

<button onclick="volver()">Volver</button>

</div>


<div class="carrito">

<h3>Carrito</h3>

<div id="listaCarrito"></div>

<hr>

<p>Total: $<span id="total">0</span></p>

<button onclick="comprar()">Comprar carrito</button>

</div>

<script>

let perfumeActual=""
let precioML=0

let carrito=[]
let total=0

function verPerfume(nombre,precio){

document.getElementById("catalogo").style.display="none"
document.getElementById("detalle").style.display="block"

perfumeActual=nombre
precioML=precio

document.getElementById("nombrePerfume").innerText=nombre

}

function volver(){

document.getElementById("catalogo").style.display="flex"
document.getElementById("detalle").style.display="none"

}

function agregar(){

let ml=document.getElementById("mlSelect").value

let precio=ml*precioML

carrito.push({
nombre:perfumeActual,
ml:ml,
precio:precio
})

actualizarCarrito()

}

function actualizarCarrito(){

let lista=""

total=0

carrito.forEach(item=>{

lista+=item.nombre+" "+item.ml+"ml ($"+item.precio+")<br>"

total+=item.precio

})

document.getElementById("listaCarrito").innerHTML=lista

document.getElementById("total").innerText=total

}

function comprar(){

let nombre=prompt("Escribe tu nombre")

let pedido=""

carrito.forEach(item=>{

pedido+=item.nombre+" "+item.ml+"ml ($"+item.precio+")%0A"

})

let mensaje="Hola Jhoan, soy "+nombre+" me gustaría realizar mi pedido:%0A%0A"+pedido+"%0ATotal del pedido $"+total

window.open("https://wa.me/529213042001?text="+mensaje)

}

</script>

</body>
</html>
