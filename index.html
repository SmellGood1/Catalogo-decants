<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Decants Abdiel</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
}

header{
text-align:center;
padding:25px;
font-size:24px;
letter-spacing:2px;
}

.catalogo{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
gap:20px;
padding:20px;
}

.card{
background:#1b1b1b;
border-radius:12px;
overflow:hidden;
cursor:pointer;
transition:0.3s;
box-shadow:0 10px 20px rgba(0,0,0,0.4);
}

.card:hover{
transform:translateY(-8px);
box-shadow:0 20px 40px rgba(0,0,0,0.6);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.card h3{
padding:10px;
font-size:15px;
}

.detalle{
display:none;
padding:25px;
text-align:center;
}

.detalle img{
width:250px;
border-radius:12px;
}

button{
background:#d4af37;
border:none;
padding:12px 20px;
border-radius:8px;
font-weight:bold;
cursor:pointer;
margin-top:15px;
}

button:hover{
opacity:0.9;
}

#carritoBtn{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
padding:15px;
border-radius:50%;
font-size:22px;
cursor:pointer;
}

#carrito{
position:fixed;
right:-320px;
top:0;
width:300px;
height:100%;
background:#1b1b1b;
padding:20px;
transition:0.4s;
overflow:auto;
}

#carrito.activo{
right:0;
}

</style>

</head>

<body>

<header>
DECANTS ABDIEL
</header>

<div class="catalogo" id="catalogo"></div>

<div class="detalle" id="detalle">

<h2 id="nombre"></h2>

<img id="imagen">

<br><br>

<select id="ml">
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
<option>6</option>
<option>7</option>
<option>8</option>
<option>9</option>
<option>10</option>
</select>

<br>

<button onclick="agregar()">Agregar al carrito</button>

<br><br>

<button onclick="volver()">Volver</button>

</div>

<div id="carritoBtn" onclick="toggleCarrito()">🛒</div>

<div id="carrito">

<h3>Carrito</h3>

<div id="lista"></div>

<hr>

Total $<span id="total">0</span>

<br><br>

<button onclick="comprar()">Comprar</button>

</div>

<script>

let perfumes=[

{name:"Asad Clasico",img:"IMAGEN"},
{name:"Hawas Clasico",img:"IMAGEN"},
{name:"Le beau le parfum",img:"IMAGEN"},
{name:"Shaghaf oud aswad",img:"IMAGEN"},
{name:"Al qiam gold",img:"IMAGEN"},
{name:"Vintage radio",img:"IMAGEN"},
{name:"Ramz Silver",img:"IMAGEN"},
{name:"Ishq al Shuyukh",img:"IMAGEN"},
{name:"Durathi Blue",img:"IMAGEN"},
{name:"Club de nuit urban man intense",img:"IMAGEN"},
{name:"Khamrah Qawah",img:"IMAGEN"},
{name:"Odyssey homme",img:"IMAGEN"},
{name:"9pm Rebel",img:"IMAGEN"},
{name:"Odyssey Mandarin Sky",img:"IMAGEN"},
{name:"Odyssey Aqua",img:"IMAGEN"},
{name:"Emeer Lattafa Al Oud",img:"IMAGEN"},
{name:"9pm Night Out",img:"IMAGEN"}

]

let catalogo=document.getElementById("catalogo")

perfumes.forEach((p,i)=>{

catalogo.innerHTML+=`

<div class="card" onclick="ver(${i})">

<img src="${p.img}">

<h3>${p.name}</h3>

</div>

`

})

let actual=0

let carrito=[]

let total=0

function ver(i){

actual=i

document.getElementById("catalogo").style.display="none"
document.getElementById("detalle").style.display="block"

document.getElementById("nombre").innerText=perfumes[i].name
document.getElementById("imagen").src=perfumes[i].img

}

function volver(){

document.getElementById("catalogo").style.display="grid"
document.getElementById("detalle").style.display="none"

}

function agregar(){

let ml=parseInt(document.getElementById("ml").value)

ml=ml+1

let precio=ml*40

carrito.push({
nombre:perfumes[actual].name,
ml:ml,
precio:precio
})

actualizar()

}

function actualizar(){

let lista=""

total=0

carrito.forEach(p=>{

lista+=p.nombre+" "+p.ml+"ml ($"+p.precio+")<br>"

total+=p.precio

})

document.getElementById("lista").innerHTML=lista
document.getElementById("total").innerText=total

}

function toggleCarrito(){

document.getElementById("carrito").classList.toggle("activo")

}

function comprar(){

let nombre=prompt("Tu nombre")

let pedido=""

carrito.forEach(p=>{

pedido+=p.nombre+" "+p.ml+"ml ($"+p.precio+")%0A"

})

let mensaje="Hola Jhoan, soy "+nombre+" me gustaría realizar mi pedido:%0A%0A"+pedido+"%0ATotal $"+total

window.open("https://wa.me/529213042001?text="+mensaje)

}

</script>

</body>
</html>
