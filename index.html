<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SmellGood Decants</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<style>

:root{
--gold:#d4af37;
--bg:#0f0f0f;
--card:#1b1b1b;
--panel:#141414;
--text:#f2f2f2;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins;
}

body{
background:var(--bg);
color:var(--text);
}

/* HEADER */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
background:#111;
box-shadow:0 2px 10px rgba(0,0,0,.6);
}

.logo{
font-family:"Playfair Display";
font-size:30px;
color:var(--gold);
font-weight:700;
}

#carritoBtn{
cursor:pointer;
font-size:22px;
position:relative;
}

#contador{
background:var(--gold);
color:black;
font-size:12px;
padding:3px 7px;
border-radius:20px;
position:absolute;
top:-8px;
right:-12px;
}

/* CASAS */

.casa{
font-family:"Playfair Display";
font-size:28px;
margin:40px 40px 10px;
color:var(--gold);
border-bottom:2px solid var(--gold);
display:inline-block;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
gap:25px;
padding:10px 40px 30px;
}

.card{
background:var(--card);
padding:15px;
border-radius:12px;
text-align:center;
cursor:pointer;
transition:.25s;
box-shadow:0 3px 10px rgba(0,0,0,.6);
}

.card:hover{
transform:translateY(-6px);
}

.card img{
width:100%;
height:180px;
object-fit:contain;
}

.card div{
margin-top:10px;
font-weight:500;
}

/* DETALLE PERFUME */

#detalle{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.7);
display:none;
justify-content:center;
align-items:center;
}

.detalleBox{
background:var(--panel);
width:420px;
padding:30px;
border-radius:15px;
text-align:center;
}

.detalleBox img{
width:230px;
}

.perfumeNombre{
font-family:"Playfair Display";
font-size:26px;
margin:10px 0;
color:var(--gold);
}

.concentracion{
color:var(--gold);
font-weight:600;
margin:5px 0;
}

.marca{
font-size:14px;
opacity:.7;
margin-bottom:10px;
}

select{
padding:10px;
margin:10px 0;
background:#222;
color:white;
border:none;
border-radius:6px;
}

button{
background:var(--gold);
border:none;
padding:12px 20px;
color:black;
border-radius:6px;
cursor:pointer;
font-weight:600;
}

/* CARRITO */

#carritoPanel{
position:fixed;
right:-350px;
top:0;
width:320px;
height:100%;
background:var(--panel);
box-shadow:-3px 0 10px rgba(0,0,0,.6);
transition:.4s;
padding:25px;
overflow:auto;
}

#carritoPanel.open{
right:0;
}

.itemCarrito{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:12px;
font-size:14px;
}

.quitar{
background:#e74c3c;
color:white;
border:none;
padding:4px 8px;
border-radius:4px;
cursor:pointer;
}

/* TOAST */

#toast{
position:fixed;
bottom:-80px;
left:50%;
transform:translateX(-50%);
background:#2ecc71;
color:white;
padding:15px 25px;
border-radius:30px;
transition:.5s;
}

#toast.show{
bottom:30px;
}

</style>
</head>

<body>

<header>
<div class="logo">SmellGood Decants</div>

<div id="carritoBtn" onclick="toggleCarrito()">
🛒
<span id="contador">0</span>
</div>
</header>

<div id="catalogo"></div>

<!-- DETALLE -->

<div id="detalle">
<div class="detalleBox">

<img id="dImg">

<div class="perfumeNombre" id="dNombre"></div>
<div class="concentracion" id="dConc"></div>
<div class="marca" id="dMarca"></div>

<select id="ml">
<option value="1">1 ml</option>
<option value="2">2 ml</option>
<option value="3">3 ml</option>
<option value="4">4 ml</option>
<option value="5">5 ml</option>
<option value="6">6 ml</option>
<option value="7">7 ml</option>
<option value="8">8 ml</option>
<option value="9">9 ml</option>
<option value="10">10 ml</option>
</select>

<br>

<button onclick="addCarrito()">Añadir al carrito</button>

<br><br>

<button onclick="cerrarDetalle()">Cerrar</button>

</div>
</div>

<!-- CARRITO -->

<div id="carritoPanel">

<h2>Carrito</h2>

<br>

<div id="listaCarrito"></div>

<br>

<input id="nombreCliente" placeholder="Tu nombre">

<br><br>

<button onclick="enviarPedido()">Enviar pedido</button>

</div>

<div id="toast">Añadido exitosamente</div>

<script>

const precioML = 8

let carrito=[]
let actual=null

const catalogo=document.getElementById("catalogo")

for(const casa in perfumes){

catalogo.innerHTML+=`<div class="casa">${casa}</div>`
catalogo.innerHTML+=`<div class="grid" id="${casa}"></div>`

perfumes[casa].forEach(p=>{

document.getElementById(casa).innerHTML+=`

<div class="card" onclick='verPerfume(${JSON.stringify(p)})'>
<img src="${p.img}">
<div>${p.name}</div>
</div>

`

})

}

function verPerfume(p){

actual=p

dImg.src=p.img
dNombre.innerText=p.name
dConc.innerText=p.conc
dMarca.innerText="Casa: "+buscarMarca(p.name)

detalle.style.display="flex"

}

function cerrarDetalle(){
detalle.style.display="none"
}

function addCarrito(){

let ml=document.getElementById("ml").value
let precio = ml * precioML

let item={
nombre:actual.name,
ml:ml,
precio:precio
}

carrito.push(item)

contador.innerText=carrito.length

renderCarrito()

toast.classList.add("show")

setTimeout(()=>toast.classList.remove("show"),2000)

}

function renderCarrito(){

listaCarrito.innerHTML=""

carrito.forEach((p,i)=>{

listaCarrito.innerHTML+=`

<div class="itemCarrito">

<span>${p.nombre} ${p.ml}ml ($${p.precio})</span>

<button class="quitar" onclick="quitar(${i})">X</button>

</div>

`

})

}

function quitar(i){

carrito.splice(i,1)

contador.innerText=carrito.length

renderCarrito()

}

function toggleCarrito(){
carritoPanel.classList.toggle("open")
}

function enviarPedido(){

let nombre = document.getElementById("nombreCliente").value

let texto=`Hola Jhoan, soy ${nombre} me gustaría hacer mi pedido de decants.%0A%0A`

let total=0

carrito.forEach(p=>{
texto+=`${p.nombre} ${p.ml}ml ($${p.precio})%0A`
total+=p.precio
})

texto+=`%0ATotal de mi pedido: $${total}`

window.open(`https://wa.me/529213042001?text=${texto}`)

}

function buscarMarca(nombre){

for(const casa in perfumes){

if(perfumes[casa].some(p=>p.name===nombre))
return casa

}

}

</script>

</body>
</html>
